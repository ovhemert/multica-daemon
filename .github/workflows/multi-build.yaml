# Builds per-variant multi-arch Docker images using native AMD64/ARM64 runners (no QEMU).
# Variants: claude, codex, copilot, gemini, opencode, pi, all
#
# Tagging scheme
# ──────────────
#  On main branch  : :<variant>   (e.g. :claude, :codex, …)
#                    :all  :latest  :main  (bundled image)
#  On semver tag   : :v1.2.3-<variant>  (per-variant)
#                    :v1.2.3  :v1.2.3-all  (bundled image)
name: Build multi-arch Docker images (all variants)

on:
  workflow_dispatch:
  #push:
  #  branches:
  #    - main
  #  paths:
  #    - 'Dockerfile'
  #    - 'docker-bake.hcl'
  #    - '.github/workflows/multi-build.yaml'
  #  tags:
  #    - 'v*'

env:
  GHCR_IMAGE: ghcr.io/${{ github.repository }}

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        platform:
          - linux/amd64
          - linux/arm64
        variant:
          - claude
          - codex
          - copilot
          - gemini
          - opencode
          - pi
          - all

    permissions:
      attestations: write
      actions: read
      checks: write
      contents: write
      deployments: none
      id-token: write
      issues: read
      discussions: read
      packages: write
      pages: none
      pull-requests: read
      repository-projects: read
      security-events: read
      statuses: read

    runs-on: ${{ matrix.platform == 'linux/amd64' && 'ubuntu-latest' || matrix.platform == 'linux/arm64' && 'ubuntu-24.04-arm' }}

    name: Build ${{ matrix.variant }} / ${{ matrix.platform }}

    steps:
      - name: Prepare platform pair env var
        id: prepare
        run: |
          platform=${{ matrix.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> $GITHUB_ENV

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.GHCR_IMAGE }}

      - name: Set up Docker Context for Buildx
        id: buildx-context
        run: |
          docker context create builders

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
        with:
          endpoint: builders
          platforms: ${{ matrix.platform }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        env:
          DOCKER_BUILDKIT: 1
        with:
          context: .
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          build-args: |
            ENABLED_CLIS=${{ matrix.variant == 'all' && 'claude,codex,copilot,gemini,opencode,pi' || matrix.variant }}
          outputs: type=image,name=${{ env.GHCR_IMAGE }},push-by-digest=true,name-canonical=true,push=true,oci-mediatypes=true
          cache-from: type=gha,scope=${{ github.repository }}-${{ github.ref_name }}-${{ matrix.platform }}-${{ matrix.variant }}
          cache-to: type=gha,scope=${{ github.repository }}-${{ github.ref_name }}-${{ matrix.platform }}-${{ matrix.variant }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: digests-${{ matrix.variant }}-${{ env.PLATFORM_PAIR }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1


  merge:
    name: Merge ${{ matrix.variant }} manifests
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        variant:
          - claude
          - codex
          - copilot
          - gemini
          - opencode
          - pi
          - all

    permissions:
      attestations: write
      actions: read
      checks: read
      contents: read
      deployments: none
      id-token: write
      issues: read
      discussions: read
      packages: write
      pages: none
      pull-requests: read
      repository-projects: read
      security-events: read
      statuses: read

    steps:
      - name: Download digests for ${{ matrix.variant }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: /tmp/digests
          pattern: digests-${{ matrix.variant }}-*
          merge-multiple: true

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.GHCR_IMAGE }}
          annotations: |
            type=org.opencontainers.image.description,value=${{ github.event.repository.description || 'No description provided' }}
          tags: |
            # Per-variant tag on the main branch (all variants)
            type=raw,value=${{ matrix.variant }},enable=${{ github.ref_name == 'main' }}
            # :latest and :main only on the bundled 'all' variant
            type=raw,value=latest,enable=${{ github.ref_name == 'main' && matrix.variant == 'all' }}
            type=raw,value=main,enable=${{ github.ref_name == 'main' && matrix.variant == 'all' }}
            # Semver tags for non-all variants: v1.2.3-claude, v1.2.3-codex, …
            type=semver,pattern=v{{version}}-${{ matrix.variant }},enable=${{ matrix.variant != 'all' }}
            # Semver tags for the bundled variant: v1.2.3 and v1.2.3-all
            type=semver,pattern=v{{version}},enable=${{ matrix.variant == 'all' }}
            type=semver,pattern=v{{version}}-all,enable=${{ matrix.variant == 'all' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
        with:
          driver-opts: |
            network=host

      - name: Login to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get execution timestamp
        id: timestamp
        run: |
          echo "timestamp=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> $GITHUB_OUTPUT

      - name: Create manifest list and push
        working-directory: /tmp/digests
        id: manifest-annotate
        continue-on-error: true
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            --annotation='index:org.opencontainers.image.description=${{ github.event.repository.description }}' \
            --annotation='index:org.opencontainers.image.created=${{ steps.timestamp.outputs.timestamp }}' \
            --annotation='index:org.opencontainers.image.url=${{ github.event.repository.url }}' \
            --annotation='index:org.opencontainers.image.source=${{ github.event.repository.url }}' \
            $(printf '${{ env.GHCR_IMAGE }}@sha256:%s ' *)

      - name: Create manifest list and push (without annotations)
        if: steps.manifest-annotate.outcome == 'failure'
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.GHCR_IMAGE }}@sha256:%s ' *)

      - name: Inspect image
        id: inspect
        run: |
          docker buildx imagetools inspect '${{ env.GHCR_IMAGE }}:${{ steps.meta.outputs.version }}'


  report-sizes:
    name: Report image sizes
    runs-on: ubuntu-latest
    needs: merge

    permissions:
      packages: read

    steps:
      - name: Login to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Report compressed layer sizes per variant
        env:
          IMAGE: ${{ env.GHCR_IMAGE }}
        run: |
          echo "## Image Size Report" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Variant | Platform | Compressed size |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---------|----------|-----------------|" >> "$GITHUB_STEP_SUMMARY"

          for variant in claude codex copilot gemini opencode pi all; do
            tag="${variant}"
            raw=$(docker buildx imagetools inspect "${IMAGE}:${tag}" --raw 2>/dev/null || true)
            if [ -z "$raw" ]; then
              echo "| ${variant} | — | not available |" >> "$GITHUB_STEP_SUMMARY"
              continue
            fi
            # Sum all layer sizes per platform manifest
            echo "$raw" | jq -r --arg v "${variant}" '
              .manifests[]
              | select(.platform.os != "unknown")
              | "\($v) | \(.platform.os)/\(.platform.architecture) | \(.size / 1048576 * 10 | round / 10) MB"
            ' | while IFS='|' read -r v platform size; do
              echo "| $(echo $v | xargs) | $(echo $platform | xargs) | $(echo $size | xargs) (compressed) |" >> "$GITHUB_STEP_SUMMARY"
            done
          done

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "_Sizes are compressed manifest totals. Uncompressed images are typically 3–4× larger._" >> "$GITHUB_STEP_SUMMARY"
