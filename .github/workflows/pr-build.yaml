# Validates that all per-agent image variants build successfully on pull requests.
# Images are built for linux/amd64 and linux/arm64 but never pushed.
name: PR build check

on:
  pull_request:
    branches:
      - main
    paths:
      - 'docker/Dockerfile.claude'
      - 'docker/Dockerfile.codex'
      - 'docker/Dockerfile.copilot'
      - 'docker/Dockerfile.gemini'
      - 'docker/Dockerfile.hermes'
      - 'docker/Dockerfile.opencode'
      - 'docker/Dockerfile.pi'
      - 'docker/docker-entrypoint.sh'
      - 'docker/docker-entrypoint-hermes.sh'
      - 'versions.env'
      - '.github/workflows/pr-build.yaml'

env:
  GHCR_IMAGE: ghcr.io/${{ github.repository }}

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        variant:
          - claude
          - codex
          - copilot
          - gemini
          - hermes
          - opencode
          - pi

    runs-on: ubuntu-latest

    name: Build ${{ matrix.variant }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0

      - name: Set up Docker Context for Buildx
        id: buildx-context
        run: docker context create builders

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
        with:
          endpoint: builders
          platforms: linux/amd64,linux/arm64

      - name: Build (no push)
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        env:
          DOCKER_BUILDKIT: 1
        with:
          context: .
          file: docker/Dockerfile.${{ matrix.variant }}
          platforms: linux/amd64,linux/arm64
          push: false
          cache-from: |
            type=gha,scope=${{ github.repository }}-${{ github.head_ref }}-${{ matrix.variant }}
            type=gha,scope=${{ github.repository }}-main-${{ matrix.variant }}
          cache-to: type=gha,scope=${{ github.repository }}-${{ github.head_ref }}-${{ matrix.variant }},mode=max
