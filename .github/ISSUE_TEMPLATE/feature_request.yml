name: Feature request
description: Suggest a new CLI, image variant, or improvement to multica-daemon
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Feature requests are welcome. Please search [existing issues](https://github.com/ovhemert/multica-daemon/issues) first.

  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What are you trying to do and why is it hard right now?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe what you would like to see added or changed.
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - New CLI / agent tool
        - Image optimisation
        - Security hardening
        - Build / CI pipeline
        - Docker Compose / orchestration
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or other approaches you have tried.

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Links, related issues, or anything else that helps frame the request.
