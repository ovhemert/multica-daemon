# Builds per-variant multi-arch Docker images and pushes final tags directly.
# Variants: claude, codex, copilot, gemini, opencode, pi, all
#
# Tagging scheme
# ──────────────
#  On semver tag   : :v1.2.3-<variant>  (per-variant)
#                    :v1.2.3  :v1.2.3-all  (bundled image)
name: Build multi-arch Docker images (all variants)

on:
  workflow_dispatch:
  push:
    # branches:
    #   - main
    # paths:
    #   - 'Dockerfile'
    #   - 'docker-bake.hcl'
    #   - '.github/workflows/multi-build.yaml'
    tags:
      - 'v*'

env:
  GHCR_IMAGE: ghcr.io/${{ github.repository }}

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        variant:
          - claude
          - codex
          - copilot
          - gemini
          - opencode
          - pi
          - all

    permissions:
      attestations: write
      actions: read
      checks: write
      contents: write
      deployments: none
      id-token: write
      issues: read
      discussions: read
      packages: write
      pages: none
      pull-requests: read
      repository-projects: read
      security-events: read
      statuses: read

    runs-on: ubuntu-latest

    name: Build ${{ matrix.variant }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.GHCR_IMAGE }}
          annotations: |
            type=org.opencontainers.image.description,value=${{ github.event.repository.description || 'No description provided' }}
          tags: |
            # Per-variant tag on the main branch (all variants)
            type=raw,value=${{ matrix.variant }},enable=${{ github.ref_name == 'main' }}
            # Semver tags for non-all variants: v1.2.3-claude, v1.2.3-codex, …
            type=semver,pattern=v{{version}}-${{ matrix.variant }},enable=${{ matrix.variant != 'all' }}
            # Semver tags and :latest for the bundled variant: v1.2.3 and v1.2.3-all
            type=raw,value=latest,enable=${{ matrix.variant == 'all' }}
            type=semver,pattern=v{{version}},enable=${{ matrix.variant == 'all' }}
            type=semver,pattern=v{{version}}-all,enable=${{ matrix.variant == 'all' }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0

      - name: Set up Docker Context for Buildx
        id: buildx-context
        run: |
          docker context create builders

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
        with:
          endpoint: builders
          platforms: linux/amd64,linux/arm64

      - name: Login to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        env:
          DOCKER_BUILDKIT: 1
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          build-args: |
            ENABLED_CLIS=${{ matrix.variant == 'all' && 'claude,codex,copilot,gemini,opencode,pi' || matrix.variant }}
          cache-from: type=gha,scope=${{ github.repository }}-${{ github.ref_name }}-${{ matrix.variant }}
          cache-to: type=gha,scope=${{ github.repository }}-${{ github.ref_name }}-${{ matrix.variant }}
          provenance: true
          sbom: true

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign image with Cosign
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          cosign sign --yes "${GHCR_IMAGE}@${DIGEST}"

      - name: Generate and upload SBOM artifact
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ${{ env.GHCR_IMAGE }}@${{ steps.build.outputs.digest }}
          artifact-name: sbom-${{ matrix.variant }}.spdx.json
          output-file: /tmp/sbom-${{ matrix.variant }}.spdx.json


  report-sizes:
    name: Report image sizes
    runs-on: ubuntu-latest
    needs: build

    permissions:
      packages: read

    steps:
      - name: Login to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Report compressed layer sizes per variant
        env:
          IMAGE: ${{ env.GHCR_IMAGE }}
        run: |
          echo "## Image Size Report" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Variant | Platform | Compressed size |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---------|----------|-----------------|" >> "$GITHUB_STEP_SUMMARY"

          for variant in claude codex copilot gemini opencode pi all; do
            tag="${variant}"
            raw=$(docker buildx imagetools inspect "${IMAGE}:${tag}" --raw 2>/dev/null || true)
            if [ -z "$raw" ]; then
              echo "| ${variant} | — | not available |" >> "$GITHUB_STEP_SUMMARY"
              continue
            fi
            # Sum all layer sizes per platform manifest
            echo "$raw" | jq -r --arg v "${variant}" '
              .manifests[]
              | select(.platform.os != "unknown")
              | "\($v) | \(.platform.os)/\(.platform.architecture) | \(.size / 1048576 * 10 | round / 10) MB"
            ' | while IFS='|' read -r v platform size; do
              echo "| $(echo $v | xargs) | $(echo $platform | xargs) | $(echo $size | xargs) (compressed) |" >> "$GITHUB_STEP_SUMMARY"
            done
          done

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "_Sizes are compressed manifest totals. Uncompressed images are typically 3–4× larger._" >> "$GITHUB_STEP_SUMMARY"
