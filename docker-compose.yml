x-daemon-environment: &daemon-environment
  MULTICA_APP_URL: ${MULTICA_APP_URL:-http://localhost:3000}
  MULTICA_SERVER_URL: ${MULTICA_SERVER_URL:-http://localhost:8080}
  MULTICA_TOKEN: ${MULTICA_TOKEN}
  GIT_AUTHOR_NAME: ${GIT_AUTHOR_NAME:-Multica Daemon}
  GIT_AUTHOR_EMAIL: ${GIT_AUTHOR_EMAIL:-daemon@multica.ai}
  GITHUB_TOKEN: ${GITHUB_TOKEN}

x-workspace-volumes: &workspace-volumes
  - workspaces:/workspaces

services:
  daemon:
    image: multica-daemon:dev
    profiles:
      - all
    build:
      context: .
      dockerfile: ./docker/Dockerfile
      args:
        ENABLED_CLIS: claude,codex,copilot,gemini,opencode,pi
    restart: unless-stopped
    environment:
      <<: *daemon-environment
      MULTICA_DAEMON_ID: dev-all
    volumes: *workspace-volumes

