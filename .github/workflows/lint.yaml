# Runs hadolint on Docker image definitions on every PR and push to main.
name: Lint

on:
  pull_request:
    branches:
      - main
    paths:
      - 'docker/Dockerfile'
      - 'docker/Dockerfile.claude'
      - 'docker/Dockerfile.codex'
      - 'docker/Dockerfile.copilot'
      - 'docker/Dockerfile.gemini'
      - 'docker/Dockerfile.hermes'
      - 'docker/Dockerfile.opencode'
      - 'docker/Dockerfile.pi'
      - '.hadolint.yaml'
      - '.github/workflows/lint.yaml'
  push:
    branches:
      - main
    paths:
      - 'docker/Dockerfile'
      - 'docker/Dockerfile.claude'
      - 'docker/Dockerfile.codex'
      - 'docker/Dockerfile.copilot'
      - 'docker/Dockerfile.gemini'
      - 'docker/Dockerfile.hermes'
      - 'docker/Dockerfile.opencode'
      - 'docker/Dockerfile.pi'
      - '.hadolint.yaml'
      - '.github/workflows/lint.yaml'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  hadolint:
    name: Lint ${{ matrix.dockerfile }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        dockerfile:
          - docker/Dockerfile
          - docker/Dockerfile.claude
          - docker/Dockerfile.codex
          - docker/Dockerfile.copilot
          - docker/Dockerfile.gemini
          - docker/Dockerfile.hermes
          - docker/Dockerfile.opencode
          - docker/Dockerfile.pi
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ${{ matrix.dockerfile }}
          config: .hadolint.yaml
