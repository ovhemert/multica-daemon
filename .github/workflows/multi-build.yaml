# Builds per-agent multi-arch Docker images and pushes final tags directly.
# Variants: claude, codex, copilot, gemini, hermes, opencode, pi
#
# Tagging scheme
# ──────────────
#  On semver tag   : :v1.2.3-<variant>, :latest-<variant>  (per-variant)
name: Build multi-arch Docker images

on:
  workflow_dispatch:
  push:
    # branches:
    #   - main
    # paths:
    #   - 'docker/Dockerfile.claude'
    #   - 'docker/Dockerfile.codex'
    #   - 'docker/Dockerfile.copilot'
    #   - 'docker/Dockerfile.gemini'
    #   - 'docker/Dockerfile.hermes'
    #   - 'docker/Dockerfile.opencode'
    #   - 'docker/Dockerfile.pi'
    #   - 'docker/docker-entrypoint.sh'
    #   - 'docker/docker-entrypoint.hermes.sh'
    #   - '.github/workflows/multi-build.yaml'
    tags:
      - 'v*'

env:
  GHCR_IMAGE: ghcr.io/${{ github.repository }}
  HERMES_BASE_IMAGE: nousresearch/hermes-agent
  HERMES_VERSION: main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        variant:
          - claude
          - codex
          - copilot
          - gemini
          - hermes
          - opencode
          - pi

    permissions:
      attestations: write
      actions: read
      checks: write
      contents: write
      deployments: none
      id-token: write
      issues: read
      discussions: read
      packages: write
      pages: none
      pull-requests: read
      repository-projects: read
      security-events: write
      statuses: read

    runs-on: ubuntu-latest

    name: Build ${{ matrix.variant }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.GHCR_IMAGE }}
          # Disable auto-latest so semver tags never publish a shared
          # :latest tag. Variant-specific latest tags are configured below.
          flavor: |
            latest=false
          annotations: |
            type=org.opencontainers.image.description,value=${{ github.event.repository.description || 'No description provided' }}
          tags: |
            # Per-variant tag on the main branch
            type=raw,value=${{ matrix.variant }},enable=${{ github.ref_name == 'main' }}
            # Semver tags for variants: v1.2.3-claude, v1.2.3-codex, …
            type=semver,pattern=v{{version}}-${{ matrix.variant }}
            # Moving latest tags for variants: latest-claude, latest-codex, …
            type=raw,value=latest-${{ matrix.variant }},enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0

      - name: Set up Docker Context for Buildx
        id: buildx-context
        run: |
          docker context create builders

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
        with:
          endpoint: builders
          platforms: linux/amd64,linux/arm64

      - name: Login to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        env:
          DOCKER_BUILDKIT: 1
        with:
          context: .
          file: docker/Dockerfile.${{ matrix.variant }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          build-args: |
            HERMES_BASE_IMAGE=${{ env.HERMES_BASE_IMAGE }}
            HERMES_VERSION=${{ env.HERMES_VERSION }}
          cache-from: type=registry,ref=ghcr.io/${{ github.repository }}/build-cache:${{ matrix.variant }}
          cache-to: type=registry,ref=ghcr.io/${{ github.repository }}/build-cache:${{ matrix.variant }},mode=max

      - name: Run Trivy vulnerability scanner
        # non-blocking — remove continue-on-error once baseline is clean
        continue-on-error: true
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ env.GHCR_IMAGE }}@${{ steps.build.outputs.digest }}
          format: sarif
          output: trivy-results.sarif
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH

      - name: Upload Trivy scan results to GitHub Security tab
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          category: trivy-${{ matrix.variant }}


  report-sizes:
    name: Report image sizes
    runs-on: ubuntu-latest
    needs: build

    permissions:
      packages: read

    steps:
      - name: Login to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Report compressed layer sizes per variant
        env:
          IMAGE: ${{ env.GHCR_IMAGE }}
        run: |
          {
            echo "## Image Size Report"
            echo ""
            echo "| Variant | Platform | Compressed size |"
            echo "|---------|----------|-----------------|"
          } >> "$GITHUB_STEP_SUMMARY"

          for variant in claude codex copilot gemini hermes opencode pi; do
            if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
              tag="latest-${variant}"
            else
              tag="${variant}"
            fi
            raw=$(docker buildx imagetools inspect "${IMAGE}:${tag}" --raw 2>/dev/null || true)
            if [ -z "$raw" ]; then
              echo "| ${variant} | — | not available |" >> "$GITHUB_STEP_SUMMARY"
              continue
            fi
            # Sum all layer sizes per platform manifest
            echo "$raw" | jq -r --arg v "${variant}" '
              .manifests[]
              | select(.platform.os != "unknown")
              | "\($v) | \(.platform.os)/\(.platform.architecture) | \(.size / 1048576 * 10 | round / 10) MB"
            ' | while IFS='|' read -r v platform size; do
              echo "| $(echo "$v" | xargs) | $(echo "$platform" | xargs) | $(echo "$size" | xargs) (compressed) |" >> "$GITHUB_STEP_SUMMARY"
            done
          done

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "_Sizes are compressed manifest totals. Uncompressed images are typically 3–4× larger._" >> "$GITHUB_STEP_SUMMARY"
