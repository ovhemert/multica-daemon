# Lints shell scripts with shellcheck.
name: Shellcheck

on:
  push:
    branches:
      - main
    paths:
      - 'docker/docker-entrypoint.sh'
      - 'docker/docker-entrypoint.hermes.sh'
      - '.github/workflows/shellcheck.yaml'
  pull_request:
    branches:
      - main
    paths:
      - 'docker/docker-entrypoint.sh'
      - 'docker/docker-entrypoint.hermes.sh'
      - '.github/workflows/shellcheck.yaml'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run shellcheck
        run: shellcheck docker/docker-entrypoint.sh docker/docker-entrypoint.hermes.sh
